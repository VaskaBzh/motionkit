<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>motion.js — FLIP card animations</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: system-ui, -apple-system, sans-serif;
        background: #f1f5f9;
        color: #1e293b;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 16px;
      }

      .hero {
        text-align: center;
        max-width: 560px;
      }

      h1 {
        font-size: 3rem;
        font-weight: 800;
        letter-spacing: -0.04em;
        margin-bottom: 12px;
      }

      h1 span { color: #6366f1; }
      h1 a { color: inherit; text-decoration: none; }
      h1 a:hover { opacity: 0.75; }

      .subtitle {
        font-size: 1.1rem;
        color: #64748b;
        margin-bottom: 48px;
        line-height: 1.5;
      }

      .demos {
        display: flex;
        gap: 16px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .demo-link {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        padding: 24px 32px;
        background: #fff;
        border: 2px solid #e2e8f0;
        border-radius: 16px;
        text-decoration: none;
        color: #1e293b;
        font-weight: 700;
        font-size: 1rem;
        transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s;
        min-width: 140px;
      }

      .demo-link:hover {
        border-color: #6366f1;
        box-shadow: 0 4px 16px rgb(99 102 241 / 0.15);
        transform: translateY(-2px);
      }

      .demo-link__icon { font-size: 2rem; }
      .demo-link__label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #64748b; }
    </style>
  </head>
  <body>
    <div class="hero">
      <h1>motion<span>.js</span></h1>
      <p class="subtitle">FLIP card animations for Vue 3, React, and Vanilla JS</p>
      <div class="demos">
        <a class="demo-link" href="./vue.html">
          <span class="demo-link__icon">🟢</span>
          Vue 3
          <span class="demo-link__label">Composable</span>
        </a>
        <a class="demo-link" href="./react.html">
          <span class="demo-link__icon">🔵</span>
          React
          <span class="demo-link__label">Hook</span>
        </a>
        <a class="demo-link" href="./vanilla.html">
          <span class="demo-link__icon">🟡</span>
          Vanilla JS
          <span class="demo-link__label">No framework</span>
        </a>
      </div>
    </div>
  </body>
</html>
